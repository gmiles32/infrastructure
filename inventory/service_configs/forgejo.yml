compose_schema_version: "3"
containers:
  - services:
    image: codeberg.org/forgejo/forgejo:15
    active: true
    container_name: forgejo
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    networks:
      - forgejo
    volumes:
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "222:22"

networks: []
volumes: []
